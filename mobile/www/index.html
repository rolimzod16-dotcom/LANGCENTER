<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Lang Center</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(180deg, #eef2ff 0%, #f4f4f5 100%);
        font-family: Arial, sans-serif;
        color: #18181b;
      }
      .card {
        text-align: center;
        padding: 2rem;
      }
      .logo {
        width: 80px;
        height: 80px;
        margin: 0 auto 1rem;
        border-radius: 24px;
        background: #4f46e5;
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2rem;
        font-weight: 700;
      }
      p {
        color: #71717a;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">LC</div>
      <h1>Lang Center</h1>
      <p>Загрузка...</p>
    </div>
  </body>
</html>
